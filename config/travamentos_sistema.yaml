travas_obrigatorias:
  - id: "TRAVA_01"
    regra: "Nenhuma nova rodada deve substituir source_registry.csv, evidence_registry.csv, query_plan.csv ou fetch_log.csv sem gerar backup ou artefato congelado."
  - id: "TRAVA_02"
    regra: "Todo workflow novo deve ter workflow_dispatch para execução manual controlada."
  - id: "TRAVA_03"
    regra: "Todo coletor novo deve gravar tentativa de coleta em data/reference/fetch_log.csv, inclusive em caso de falha."
  - id: "TRAVA_04"
    regra: "Todo dado usado pela calculadora deve produzir evidência em data/evidence/ ou ser registrado como pendência explícita."
  - id: "TRAVA_05"
    regra: "Fonte pública, endpoint, período, unidade e limitação devem estar explícitos no arquivo processado ou na evidência."
  - id: "TRAVA_06"
    regra: "Dados automáticos que forem proxy não podem ser tratados como indicador final sem campo de limitação."
  - id: "TRAVA_07"
    regra: "Se um workflow falhar, não avançar rodada até registrar causa provável e patch corretivo."
  - id: "TRAVA_08"
    regra: "Os arquivos entregáveis devem ser espelhados no Google Drive antes de encerrar a rodada, quando a permissão estiver disponível."
  - id: "TRAVA_09"
    regra: "Não apagar artefatos zip entregues anteriormente; apenas descartar diretórios temporários extraídos."
  - id: "TRAVA_10"
    regra: "A retomada deve começar pela leitura de SISTEMA_ESTADO_RETOMADA.md e config/travamentos_sistema.yaml."

