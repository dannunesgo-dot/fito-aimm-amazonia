# Rodada 4.20 — motor de cálculo canônico preliminar da calculadora AIMM
# Objetivo: calcular score estrutural preliminar alinhado ao modelo canônico
# (project_outcomes + market_outcomes), mantendo travas e governança.

projeto:
  nome: "Fito+ Amazônia"
  investimento_total_brl: 80000000
  moeda: "BRL"
  status_calculo: "preliminar_estrutural_canonico"

id_resultado_preliminar: "AIMM_ENGINE_PRELIMINAR_4_20"

# Dimensões canônicas AIMM (IFC)
dimensoes_canonicas:
  - "project_outcomes"
  - "market_outcomes"

subdimensoes_permitidas:
  - "stakeholder_effects"
  - "economy_wide_effects"
  - "environmental_social_effects"
  - "competitiveness"
  - "resilience"
  - "sustainability"

eixos_analiticos_permitidos:
  - "gap"
  - "intensity"
  - "impact_potential"
  - "risk_assessment"
  - "monitoring"
  - "benchmark"
  - "cross_cutting"

status_uso_permitidos:
  - "calculavel_preliminar"
  - "proxy_baixa_confianca"
  - "bloqueado_sem_benchmark"
  - "bloqueado_revisao_humana"
  - "apenas_monitoramento"

tratamento_risco:
  modo: "penalizador"
  formula: "score_liquido = score_canonico * (1 - risco_penalty / 100)"
  observacao: "Risco é eixo analítico e reduz robustez do score preliminar."

tratamento_confianca:
  alto: 1.00
  medio: 0.75
  baixo: 0.50
  bloqueado: 0.00

tratamento_prontidao_benchmark:
  benchmark_utilizavel: 1.00
  proxy_utilizavel_com_validacao: 0.75
  proxy_baixa_confianca: 0.50
  bloqueado: 0.00
  bloqueado_sem_benchmark: 0.00
  revisar: 0.25

# Bandas de leitura preliminar (fonte secundária citando AIMM oficial)
faixas_score:
  low: [0, 34]
  good: [35, 49]
  strong: [50, 59]
  excellent: [60, 100]

regras_liberacao_final:
  permitir_score_final: false
  exige_sem_erros_validacao: true
  exige_dimensoes_canonicas_completas: true
  exige_sem_indicador_bloqueado: true
  exige_sem_bloqueios_criticos: true
  exige_sem_bloqueio_revisao_humana: true

fontes_estruturais_esperadas:
  - "data/processed/aimm_canonical_dimension_registry.csv"
  - "data/processed/aimm_indicator_alignment_registry.csv"
  - "data/processed/benchmark_readiness_matrix.csv"
  - "data/processed/benchmark_gap_report.csv"

travas:
  - "O motor calcula score estrutural preliminar, não score AIMM final validado."
  - "Sem liberação explícita no gate, o score final permanece bloqueado."
  - "Indicador bloqueado por benchmark ou revisão humana não libera score final."
  - "Lacunas operacionais devem permanecer explícitas no relatório de bloqueios."
