name: mapaosc-triagem

on:
  workflow_dispatch:
  push:
    paths:
      - "requirements.txt"
      - "config/criterios_triagem_mapaosc.yaml"
      - "src/fito_aimm/coletor_mapaosc.py"
      - "scripts/testar_mapaosc_triagem.py"
      - "data/reference/mapaosc_query_catalog.csv"
      - "data/reference/source_registry_append_mapaosc.csv"
      - "data/raw/mapaosc/20260522_MOSC_baseDivulgacao.csv"
      - ".github/workflows/mapaosc_triagem.yml"

jobs:
  mapaosc-triagem:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tentar pré-download da base Mapa OSCs com curl
        continue-on-error: true
        run: |
          mkdir -p data/raw/mapaosc
          if [ ! -s data/raw/mapaosc/20260522_MOSC_baseDivulgacao.csv ]; then
            curl -L --ipv4 \
              --retry 6 \
              --retry-delay 30 \
              --retry-all-errors \
              --connect-timeout 90 \
              --max-time 2400 \
              -o data/raw/mapaosc/20260522_MOSC_baseDivulgacao.csv \
              "https://mapaosc.ipea.gov.br/download/20260522_MOSC_baseDivulgacao.csv"
          fi
          ls -lh data/raw/mapaosc || true

      - name: Executar triagem Mapa das OSCs/Ipea
        run: python scripts/testar_mapaosc_triagem.py

      - name: Publicar artefatos da triagem Mapa OSCs
        uses: actions/upload-artifact@v4
        with:
          name: mapaosc-triagem-fito-amazonia
          path: |
            data/raw/mapaosc/mapaosc_base_principal_filtrada_municipios.csv
            data/raw/mapaosc/dicionario_de_dados_mapa_oscs.xlsx
            data/processed/organizacoes_candidatas_mapaosc.csv
            data/processed/resumo_organizacoes_mapaosc_municipios.csv
            data/evidence/evidence_mapaosc_triagem.csv
            data/reference/fetch_log.csv
            data/reference/mapaosc_query_catalog.csv
            data/reference/source_registry_append_mapaosc.csv
            config/criterios_triagem_mapaosc.yaml
            outputs/logs/teste_mapaosc_triagem.txt
