name: rodada-4-20-aimm-alignment

on:
  workflow_dispatch:
  push:
    paths:
      - "config/aimm_alignment_rules.yaml"
      - "data/reference/aimm_canonical_dimensions_seed.csv"
      - "data/reference/aimm_indicator_alignment_seed.csv"
      - "scripts/rodada_4_20_aimm_alignment.py"
      - ".github/workflows/rodada_4_20_aimm_alignment.yml"

permissions:
  contents: read

jobs:
  aimm-alignment:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Executar Rodada 4.20
        run: python scripts/rodada_4_20_aimm_alignment.py

      - name: Publicar artefatos da Rodada 4.20
        uses: actions/upload-artifact@v4
        with:
          name: rodada-4-20-aimm-alignment-fito-amazonia
          path: |
            data/processed/aimm_canonical_dimension_registry.csv
            data/processed/aimm_indicator_alignment_registry.csv
            data/processed/aimm_alignment_validation_report.csv
            data/processed/aimm_score_blockers_registry.csv
            data/evidence/evidence_aimm_alignment.csv
            outputs/reports/RELATORIO_ALINHAMENTO_AIMM.md
            outputs/logs/teste_aimm_alignment_4_20.txt
            config/aimm_alignment_rules.yaml
            data/reference/aimm_canonical_dimensions_seed.csv
            data/reference/aimm_indicator_alignment_seed.csv
