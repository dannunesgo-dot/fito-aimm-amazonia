name: aimm-communication

on:
  workflow_dispatch:
  push:
    paths:
      - "config/aimm_communication_rules.yaml"
      - "data/reference/aimm_communication_messages_seed.csv"
      - "data/reference/aimm_visual_layout_seed.csv"
      - "src/fito_aimm/aimm_communication.py"
      - "scripts/testar_aimm_communication.py"
      - ".github/workflows/aimm_communication.yml"

permissions:
  contents: read

jobs:
  aimm-communication:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar pacote editável de comunicação AIMM
        run: python scripts/testar_aimm_communication.py

      - name: Publicar artefatos de comunicação AIMM
        uses: actions/upload-artifact@v4
        with:
          name: aimm-communication-fito-amazonia
          path: |
            data/processed/aimm_communication_messages.csv
            data/processed/aimm_visual_outputs_index.csv
            data/processed/aimm_communication_package_manifest.csv
            data/evidence/evidence_aimm_communication.csv
            outputs/visuals/aimm_dashboard_executivo.html
            outputs/visuals/aimm_dashboard_cards.svg
            outputs/visuals/aimm_dashboard_flow.mmd
            outputs/reports/aimm_communication_brief.md
            outputs/reports/aimm_communication_payload.json
            data/reference/aimm_communication_messages_seed.csv
            data/reference/aimm_visual_layout_seed.csv
            config/aimm_communication_rules.yaml
            outputs/logs/teste_aimm_communication.txt
