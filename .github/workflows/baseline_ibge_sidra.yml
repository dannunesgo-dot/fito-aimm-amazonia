name: baseline-ibge-sidra

on:
  workflow_dispatch:
  push:
    paths:
      - "src/fito_aimm/coletor_ibge.py"
      - "scripts/testar_baseline_ibge.py"
      - "data/reference/sidra_query_catalog.csv"
      - ".github/workflows/baseline_ibge_sidra.yml"

jobs:
  baseline-ibge:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar baseline IBGE/SIDRA ampliado
        run: python scripts/testar_baseline_ibge.py

      - name: Publicar artefatos do baseline IBGE/SIDRA
        uses: actions/upload-artifact@v4
        with:
          name: baseline-ibge-sidra
          path: |
            data/raw/ibge/populacao_estimada_municipios.csv
            data/raw/ibge/localidades_municipios.csv
            data/processed/territorios_ibge_baseline.csv
            data/evidence/evidence_ibge_territorios.csv
            data/reference/fetch_log.csv
            data/reference/sidra_query_catalog.csv
            outputs/logs/teste_baseline_ibge.txt
