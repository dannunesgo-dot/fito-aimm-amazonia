name: rodada-4-27-automation-ingestion-diagnostic

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  automation-ingestion-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      GH_TOKEN_DIAGNOSTIC: ${{ github.token }}
      GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GOOGLE_WORKLOAD_IDENTITY_PROVIDER }}
      GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
      GOOGLE_DRIVE_ROOT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}
      GOOGLE_DRIVE_TEST_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_TEST_FOLDER_ID }}

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Executar diagnóstico funcional AIMM 4.27
        shell: bash
        run: python scripts/rodada_4_27_automation_ingestion_diagnostic.py

      - name: Publicar artefatos da Rodada 4.27
        uses: actions/upload-artifact@v4
        with:
          name: rodada-4-27-automation-ingestion-diagnostic-fito-amazonia
          if-no-files-found: error
          path: |
            outputs/aimm/rodada_4_27_diagnostico_automacoes_ingestao
            data/processed/aimm/aimm_automation_ingestion_diagnostic_registry_4_27.csv
            data/processed/aimm/aimm_automation_ingestion_diagnostic_status_4_27.csv
            data/evidence/evidence_aimm_automation_ingestion_diagnostic_4_27.csv
            outputs/reports/RELATORIO_AIMM_DIAGNOSTICO_AUTOMACOES_4_27.md
            outputs/logs/teste_aimm_diagnostico_automacoes_4_27.txt
