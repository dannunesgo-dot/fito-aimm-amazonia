name: budget-components

on:
  workflow_dispatch:
  push:
    paths:
      - "config/budget_components_rules.yaml"
      - "data/reference/budget_components_seed.csv"
      - "data/reference/cost_assumption_registry_seed.csv"
      - "data/reference/budget_phase_schedule_seed.csv"
      - "data/reference/budget_aimm_linkage_seed.csv"
      - "src/fito_aimm/budget_components.py"
      - "scripts/testar_budget_components.py"
      - ".github/workflows/budget_components.yml"

permissions:
  contents: read

jobs:
  budget-components:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar orçamento por componente
        run: python scripts/testar_budget_components.py

      - name: Publicar artefatos de orçamento
        uses: actions/upload-artifact@v4
        with:
          name: budget-components-fito-amazonia
          path: |
            data/processed/budget_components.csv
            data/processed/cost_assumption_registry.csv
            data/processed/budget_phase_schedule.csv
            data/processed/budget_aimm_linkage.csv
            data/processed/budget_summary.csv
            data/processed/budget_validation_report.csv
            data/evidence/evidence_budget_components.csv
            data/reference/budget_components_seed.csv
            data/reference/cost_assumption_registry_seed.csv
            data/reference/budget_phase_schedule_seed.csv
            data/reference/budget_aimm_linkage_seed.csv
            config/budget_components_rules.yaml
            outputs/logs/teste_budget_components.txt
