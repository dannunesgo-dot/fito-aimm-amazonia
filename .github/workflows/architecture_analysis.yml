name: architecture-analysis

on:
  workflow_dispatch:
  push:
    paths:
      - "src/fito_aimm/architecture_analysis.py"
      - "scripts/testar_architecture_analysis.py"
      - ".github/workflows/architecture_analysis.yml"

permissions:
  contents: read

jobs:
  architecture-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar análise de arquitetura e condições técnicas
        run: python scripts/testar_architecture_analysis.py

      - name: Publicar artefatos da análise de arquitetura
        uses: actions/upload-artifact@v4
        with:
          name: architecture-analysis-fito-amazonia
          path: |
            docs/ARCHITECTURE_API_TABLE.csv
            data/processed/architecture_dependency_graph.csv
            data/evidence/evidence_architecture_analysis.csv
            outputs/logs/teste_architecture_analysis.txt
