name: aimm-dashboard

on:
  workflow_dispatch:
  push:
    paths:
      - "config/aimm_dashboard_rules.yaml"
      - "data/reference/aimm_dashboard_cards_seed.csv"
      - "data/reference/aimm_next_actions_seed.csv"
      - "src/fito_aimm/aimm_dashboard.py"
      - "scripts/testar_aimm_dashboard.py"
      - ".github/workflows/aimm_dashboard.yml"

permissions:
  contents: read

jobs:
  aimm-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar painel e outputs AIMM
        run: python scripts/testar_aimm_dashboard.py

      - name: Publicar artefatos do painel AIMM
        uses: actions/upload-artifact@v4
        with:
          name: aimm-dashboard-fito-amazonia
          path: |
            data/processed/aimm_executive_summary.csv
            data/processed/aimm_dashboard_cards.csv
            data/processed/aimm_dashboard_dimension_view.csv
            data/processed/aimm_output_manifest.csv
            data/processed/aimm_next_actions.csv
            data/evidence/evidence_aimm_dashboard.csv
            outputs/reports/aimm_executive_summary.md
            outputs/reports/aimm_dashboard_payload.json
            data/reference/aimm_dashboard_cards_seed.csv
            data/reference/aimm_next_actions_seed.csv
            config/aimm_dashboard_rules.yaml
            outputs/logs/teste_aimm_dashboard.txt
