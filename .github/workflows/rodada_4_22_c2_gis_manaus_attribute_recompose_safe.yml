name: rodada-4-22-c2-gis-manaus-attribute-recompose-safe

on:
  workflow_dispatch:
  push:
    paths:
      - "data/manual/gis/gis_manaus_attribute_recomposition_seed.csv"
      - "data/raw/gis/municipio_manaus_1302603.gpkg"
      - "scripts/rodada_4_22_c2_gis_manaus_attribute_recompose_safe.py"
      - ".github/workflows/rodada_4_22_c2_gis_manaus_attribute_recompose_safe.yml"

permissions:
  contents: read

jobs:
  gis-manaus-attribute-recompose-safe:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Conferir script seguro
        shell: bash
        run: |
          set -euo pipefail

          SCRIPT="scripts/rodada_4_22_c2_gis_manaus_attribute_recompose_safe.py"

          echo "HEAD:"
          git rev-parse HEAD

          echo "Script que será executado:"
          ls -lh "$SCRIPT"

          echo "Bloqueando qualquer contaminação por função espacial SQLite ausente..."
          if grep -n "ST_IsEmpty" "$SCRIPT"; then
            echo "::error file=$SCRIPT::Script contaminado. Termo proibido encontrado."
            exit 1
          fi

          echo "OK: script seguro sem termo proibido."

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Executar Rodada 4.22-C2
        run: python scripts/rodada_4_22_c2_gis_manaus_attribute_recompose_safe.py

      - name: Publicar artefatos da Rodada 4.22-C2
        uses: actions/upload-artifact@v4
        with:
          name: rodada-4-22-c2-gis-manaus-attribute-recompose-safe-fito-amazonia
          path: |
            outputs/gis/municipio_manaus_1302603_atributos.gpkg
            data/processed/gis/gis_manaus_attribute_recomposition_registry_c2.csv
            data/processed/gis/gis_manaus_attribute_recomposition_status_c2.csv
            data/processed/gis/gis_manaus_attribute_recomposition_gaps_c2.csv
            data/evidence/evidence_gis_manaus_attribute_recomposition_c2.csv
            outputs/reports/RELATORIO_GIS_MANAUS_4_22_C2.md
            outputs/logs/teste_gis_manaus_4_22_c2.txt
            data/manual/gis/gis_manaus_attribute_recomposition_seed.csv
