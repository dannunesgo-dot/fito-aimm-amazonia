name: Validate Drive Secrets

on:
  workflow_dispatch:

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets (no value output)
        env:
          GOOGLE_DRIVE_ROOT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}
          GOOGLE_DRIVE_TEST_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_TEST_FOLDER_ID }}
        run: |
          set -euo pipefail

          check_secret () {
            local name="$1"
            local value="$2"
            if [ -n "${value}" ]; then
              echo "✅ ${name}: secret exists"
            else
              echo "❌ ${name}: secret missing"
              exit 1
            fi
          }

          check_secret "GOOGLE_DRIVE_ROOT_FOLDER_ID" "${GOOGLE_DRIVE_ROOT_FOLDER_ID:-}"
          check_secret "GOOGLE_DRIVE_TEST_FOLDER_ID" "${GOOGLE_DRIVE_TEST_FOLDER_ID:-}"
