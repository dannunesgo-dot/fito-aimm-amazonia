name: risk-osc-screening

on:
  workflow_dispatch:
  push:
    paths:
      - "config/risk_osc_rules.yaml"
      - "data/reference/osc_due_diligence_checklist.csv"
      - "data/reference/risk_osc_rules.csv"
      - "data/processed/organizacoes_candidatas_mapaosc.csv"
      - "src/fito_aimm/risk_osc.py"
      - "src/fito_aimm/coletor_mapaosc.py"
      - "scripts/testar_risk_osc_screening.py"
      - ".github/workflows/risk_osc_screening.yml"

jobs:
  risk-osc-screening:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar screening de risco de OSCs
        run: python scripts/testar_risk_osc_screening.py

      - name: Publicar artefatos do screening de risco OSC
        uses: actions/upload-artifact@v4
        with:
          name: risk-osc-screening-fito-amazonia
          path: |
            data/processed/organizacoes_candidatas_mapaosc.csv
            data/processed/risk_osc_screening.csv
            data/processed/organizacoes_lista_curta_diligencia.csv
            data/evidence/evidence_risk_osc_screening.csv
            data/reference/osc_due_diligence_checklist.csv
            data/reference/risk_osc_rules.csv
            config/risk_osc_rules.yaml
            outputs/logs/teste_risk_osc_screening.txt
