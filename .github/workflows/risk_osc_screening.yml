name: risk-osc-screening

on:
  workflow_dispatch:
  push:
    paths:
      - "config/risk_osc_rules.yaml"
      - "data/reference/osc_due_diligence_checklist.csv"
      - "data/reference/risk_osc_rules.csv"
      - "data/processed/organizacoes_candidatas_mapaosc.csv"
      - "src/fito_aimm/risk_osc.py"
      - "scripts/testar_risk_osc_screening.py"
      - ".github/workflows/risk_osc_screening.yml"

permissions:
  contents: read
  actions: read

jobs:
  risk-osc-screening:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Baixar artefato aprovado do mapaosc-triagem
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -e
          mkdir -p data/processed data/evidence data/reference outputs/logs /tmp/mapaosc_artifact

          if [ -s data/processed/organizacoes_candidatas_mapaosc.csv ]; then
            echo "Arquivo data/processed/organizacoes_candidatas_mapaosc.csv já existe no repositório. Usando arquivo versionado."
            exit 0
          fi

          echo "Arquivo data/processed/organizacoes_candidatas_mapaosc.csv não está versionado."
          echo "Tentando baixar artefato do último workflow mapaosc-triagem bem-sucedido."

          RUN_ID="$(gh run list \
            --workflow mapaosc_triagem.yml \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')"

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "ERRO: não encontrei execução bem-sucedida do workflow mapaosc-triagem."
            echo "Correção manual: baixe o artefato mapaosc-triagem-fito-amazonia e envie organizacoes_candidatas_mapaosc.csv para data/processed/."
            exit 1
          fi

          echo "Baixando artefato mapaosc-triagem-fito-amazonia da execução $RUN_ID."
          gh run download "$RUN_ID" \
            --name mapaosc-triagem-fito-amazonia \
            --dir /tmp/mapaosc_artifact

          echo "Conteúdo do artefato baixado:"
          find /tmp/mapaosc_artifact -type f -print | sort

          ORG_FILE="$(find /tmp/mapaosc_artifact -type f -name 'organizacoes_candidatas_mapaosc.csv' | head -n 1 || true)"
          if [ -z "$ORG_FILE" ]; then
            echo "ERRO: artefato baixado, mas organizacoes_candidatas_mapaosc.csv não foi encontrado em nenhuma subpasta."
            echo "Possível causa: a execução bem-sucedida mais recente do mapaosc-triagem publicou artefato incompleto."
            echo "Correção: rode manualmente o workflow mapaosc-triagem novamente e confirme que o artefato contém data/processed/organizacoes_candidatas_mapaosc.csv."
            exit 1
          fi

          cp "$ORG_FILE" data/processed/organizacoes_candidatas_mapaosc.csv

          RESUMO_FILE="$(find /tmp/mapaosc_artifact -type f -name 'resumo_organizacoes_mapaosc_municipios.csv' | head -n 1 || true)"
          EVID_FILE="$(find /tmp/mapaosc_artifact -type f -name 'evidence_mapaosc_triagem.csv' | head -n 1 || true)"
          FETCH_FILE="$(find /tmp/mapaosc_artifact -type f -name 'fetch_log.csv' | head -n 1 || true)"
          LOG_FILE="$(find /tmp/mapaosc_artifact -type f -name 'teste_mapaosc_triagem.txt' | head -n 1 || true)"

          [ -n "$RESUMO_FILE" ] && cp "$RESUMO_FILE" data/processed/resumo_organizacoes_mapaosc_municipios.csv || true
          [ -n "$EVID_FILE" ] && cp "$EVID_FILE" data/evidence/evidence_mapaosc_triagem.csv || true
          [ -n "$FETCH_FILE" ] && cp "$FETCH_FILE" data/reference/fetch_log.csv || true
          [ -n "$LOG_FILE" ] && cp "$LOG_FILE" outputs/logs/teste_mapaosc_triagem.txt || true

          echo "Artefato mapaosc-triagem recuperado com sucesso."
          ls -lh data/processed/organizacoes_candidatas_mapaosc.csv

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar screening de risco de OSCs
        run: python scripts/testar_risk_osc_screening.py

      - name: Publicar artefatos do screening de risco OSC
        uses: actions/upload-artifact@v4
        with:
          name: risk-osc-screening-fito-amazonia
          path: |
            data/processed/organizacoes_candidatas_mapaosc.csv
            data/processed/resumo_organizacoes_mapaosc_municipios.csv
            data/processed/risk_osc_screening.csv
            data/processed/organizacoes_lista_curta_diligencia.csv
            data/evidence/evidence_mapaosc_triagem.csv
            data/evidence/evidence_risk_osc_screening.csv
            data/reference/osc_due_diligence_checklist.csv
            data/reference/risk_osc_rules.csv
            config/risk_osc_rules.yaml
            outputs/logs/teste_mapaosc_triagem.txt
            outputs/logs/teste_risk_osc_screening.txt
