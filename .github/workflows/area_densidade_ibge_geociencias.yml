name: area-densidade-ibge-geociencias

on:
  workflow_dispatch:
  push:
    paths:
      - "requirements.txt"
      - "src/fito_aimm/coletor_ibge_geociencias.py"
      - "src/fito_aimm/territorios.py"
      - "config/territorios.yaml"
      - "scripts/testar_area_densidade_ibge.py"
      - "data/reference/geociencias_query_catalog.csv"
      - "data/reference/source_registry_append_area_geociencias.csv"
      - "config/travamentos_sistema.yaml"
      - ".github/workflows/area_densidade_ibge_geociencias.yml"

jobs:
  area-densidade:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar área territorial e densidade IBGE/Geociências
        run: python scripts/testar_area_densidade_ibge.py

      - name: Publicar artefatos de área e densidade IBGE/Geociências
        uses: actions/upload-artifact@v4
        with:
          name: area-densidade-ibge-geociencias
          path: |
            data/raw/ibge/populacao_estimada_municipios.csv
            data/raw/ibge/geociencias/AR_BR_RG_UF_RGINT_RGI_MUN_2025.xls
            data/raw/ibge/geociencias/areas_territoriais_municipios_projeto.csv
            data/processed/territorios_ibge_area_densidade.csv
            data/evidence/evidence_ibge_area_densidade.csv
            data/reference/fetch_log.csv
            data/reference/geociencias_query_catalog.csv
            data/reference/source_registry_append_area_geociencias.csv
            config/travamentos_sistema.yaml
            outputs/logs/teste_area_densidade_ibge.txt
