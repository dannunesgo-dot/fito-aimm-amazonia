name: pre-diligencia-manual-validation

on:
  workflow_dispatch:
  push:
    paths:
      - "config/pre_diligencia_manual_validation_rules.yaml"
      - "data/input/pre_diligencia_status_validacao_manual.csv"
      - "data/processed/pre_diligencia_status_validacao.csv"
      - "src/fito_aimm/pre_diligencia_manual_validator.py"
      - "src/fito_aimm/__init__.py"
      - "scripts/testar_pre_diligencia_manual_validation.py"
      - ".github/workflows/pre_diligencia_manual_validation.yml"

permissions:
  contents: read
  actions: read

jobs:
  pre-diligencia-manual-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Verificar módulo de validação manual
        shell: bash
        run: |
          set -e
          echo "Conteúdo de src/fito_aimm:"
          ls -la src/fito_aimm
          test -f src/fito_aimm/pre_diligencia_manual_validator.py

      - name: Recuperar artefato de status da pré-diligência a partir do pre-diligencia-osc
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -e
          mkdir -p data/processed data/evidence data/input outputs/logs /tmp/pre_diligencia_artifact

          if [ -s data/processed/pre_diligencia_status_validacao.csv ]; then
            echo "Arquivo de status já existe no repositório. Usando arquivo versionado."
            exit 0
          fi

          echo "Tentando baixar artefato do último workflow pre-diligencia-osc bem-sucedido."

          RUN_ID="$(gh run list \
            --workflow pre_diligencia_osc.yml \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')"

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "ERRO: não encontrei execução bem-sucedida do workflow pre-diligencia-osc."
            echo "Execute antes o workflow pre-diligencia-osc para gerar o status de validação."
            exit 1
          fi

          gh run download "$RUN_ID" \
            --name pre-diligencia-osc-fito-amazonia \
            --dir /tmp/pre_diligencia_artifact

          echo "Conteúdo do artefato baixado:"
          find /tmp/pre_diligencia_artifact -type f -print | sort

          STATUS_FILE="$(find /tmp/pre_diligencia_artifact -type f -name 'pre_diligencia_status_validacao.csv' | head -n 1 || true)"

          if [ -z "$STATUS_FILE" ]; then
            echo "ERRO: artefato baixado, mas pre_diligencia_status_validacao.csv não foi encontrado."
            exit 1
          fi

          cp "$STATUS_FILE" data/processed/pre_diligencia_status_validacao.csv
          echo "Artefato de status recuperado com sucesso."

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar validação de preenchimento manual da pré-diligência
        run: python scripts/testar_pre_diligencia_manual_validation.py

      - name: Publicar artefatos da validação manual
        uses: actions/upload-artifact@v4
        with:
          name: pre-diligencia-manual-validation-fito-amazonia
          path: |
            data/processed/pre_diligencia_status_validacao.csv
            data/processed/pre_diligencia_status_validacao_template_drive.csv
            data/processed/pre_diligencia_status_validacao_ready_for_drive.csv
            data/processed/pre_diligencia_manual_validation_report.csv
            data/evidence/evidence_pre_diligencia_manual_validation.csv
            config/pre_diligencia_manual_validation_rules.yaml
            outputs/logs/teste_pre_diligencia_manual_validation.txt
