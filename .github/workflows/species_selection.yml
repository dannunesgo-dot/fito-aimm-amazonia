name: species-selection

on:
  workflow_dispatch:
  push:
    paths:
      - "config/species_selection_rules.yaml"
      - "data/reference/species_candidate_registry_seed.csv"
      - "data/reference/species_selection_criteria_seed.csv"
      - "data/reference/species_selection_matrix_seed.csv"
      - "data/reference/species_product_route_seed.csv"
      - "src/fito_aimm/species_selection.py"
      - "scripts/testar_species_selection.py"
      - ".github/workflows/species_selection.yml"

permissions:
  contents: read

jobs:
  species-selection:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar registro e matriz de espécies
        run: python scripts/testar_species_selection.py

      - name: Publicar artefatos de espécies candidatas
        uses: actions/upload-artifact@v4
        with:
          name: species-selection-fito-amazonia
          path: |
            data/processed/species_candidate_registry.csv
            data/processed/species_selection_criteria.csv
            data/processed/species_selection_matrix.csv
            data/processed/species_priority_ranking.csv
            data/processed/species_product_route_registry.csv
            data/evidence/evidence_species_selection.csv
            data/reference/species_candidate_registry_seed.csv
            data/reference/species_selection_criteria_seed.csv
            data/reference/species_selection_matrix_seed.csv
            data/reference/species_product_route_seed.csv
            config/species_selection_rules.yaml
            outputs/logs/teste_species_selection.txt
