name: rodada-4-22-e-gis-replication-package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gis-replication-package:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Gerar pacote operacional GIS 4.22-E
        shell: bash
        run: |
          set -euo pipefail

          BASE="outputs/gis/rodada_4_22_E_pacote_replicacao"

          mkdir -p "$BASE"
          mkdir -p data/processed/gis
          mkdir -p data/evidence
          mkdir -p outputs/reports
          mkdir -p outputs/logs

          cat > "$BASE/GUIA_CURTO_REPLICACAO_GIS_NOVO_MUNICIPIO.md" <<'EOF'
# Guia curto — replicação GIS para novo município

## Finalidade

Repetir o fluxo GIS validado em Manaus para outro município.

## O que a equipe precisa entregar

1. GeoPackage isolado do município.
2. Código IBGE do município.
3. Nome do município.
4. Nome da UF.
5. Sigla da UF.
6. Área em km² conforme fonte oficial usada.
7. Prints de validação no QGIS.
8. Projeto QGIS salvo.

## Fluxo simples

1. Abrir a malha municipal no QGIS.
2. Selecionar o município pelo código IBGE.
3. Exportar somente o município como GeoPackage.
4. Conferir se há 1 feição.
5. Registrar CRS, campo de código e valor do código.
6. Criar tabela relacional de atributos.
7. Fazer join visual no QGIS.
8. Confirmar campos com prefixo aimm_ preenchidos.
9. Salvar prints e projeto QGIS.
10. Registrar a validação no GitHub.

## Travas

- Não editar geometria.
- Não recalcular área nesta etapa.
- Não gerar buffer.
- Não calcular densidade.
- Não calcular centroide.
- Não liberar score AIMM final.
EOF

          cat > "$BASE/GUIA_TECNICO_QGIS_REPLICACAO_MUNICIPIO.md" <<'EOF'
# Guia técnico — QGIS 3.40.14 e GitHub

## 1. Preparar GeoPackage isolado

No QGIS:

Camada > Adicionar Camada > Adicionar Camada Vetorial

Abra a malha municipal do IBGE.

Selecione o município por expressão. Exemplo:

"CD_MUN" = '1302603'

Depois:

Botão direito na camada > Exportar > Salvar feições selecionadas como...

Configuração recomendada:

- Formato: GeoPackage
- CRS: manter o CRS original ou registrar explicitamente o CRS usado
- Nome do arquivo: municipio_nome_codigo.gpkg

Exemplo:

municipio_manaus_1302603.gpkg

## 2. Conferências mínimas

- Total de feições: 1
- Código IBGE correto
- Município correto
- UF correta
- Geometria visível
- CRS identificado
- Sem problema visual grosseiro

## 3. Join relacional

Usar:

Campo da camada geométrica = campo da tabela relacional

Exemplo validado:

CD_MUN = codigo_ibge

Prefixo recomendado:

aimm_

## 4. Arquivamento no Drive

Usar a estrutura:

- 09_gis/01_insumos_brutos
- 09_gis/02_qgis_projetos
- 09_gis/03_camadas_validadas
- 09_gis/04_outputs
- 09_gis/05_logs

## 5. Restrições

Não usar workflows antigos C, C2 ou C3.

Não fazer UPDATE direto na tabela geométrica do GeoPackage pelo SQLite.

Não usar ST_IsEmpty, ST_Area, ST_Centroid ou ST_Buffer no SQLite puro do GitHub Actions.

Operações espaciais reais devem ser feitas no QGIS ou em rodada própria com biblioteca GIS adequada.
EOF

          cat > "$BASE/checklist_replicacao_gis_novo_municipio.csv" <<'EOF'
item;obrigatorio;como_conferir
GeoPackage isolado criado;sim;arquivo abre no QGIS
Apenas uma feição;sim;tabela de atributos mostra total 1
Código IBGE confirmado;sim;campo de código tem valor esperado
CRS registrado;sim;propriedades da camada
Geometria visível;sim;aproximar à camada
Tabela relacional criada;sim;tabela interna ou CSV validado
Join criado;sim;campos com prefixo aimm_ aparecem preenchidos
Prints gerados;sim;arquivos PNG arquivados
Projeto QGIS salvo;sim;arquivo QGZ no Drive
Registro GitHub executado;sim;workflow verde
EOF

          cat > "$BASE/gis_novo_municipio_manifest_template.csv" <<'EOF'
rodada;municipio;codigo_ibge;arquivo_gpkg;crs;campo_codigo;valor_codigo;campo_municipio;valor_municipio;campo_uf;valor_uf;numero_feicoes;geometria_visivel_qgis;check_validity_executado;valid_count;invalid_count;error_count;pasta_drive;observacao
preencher;preencher;preencher;municipio_nome_codigo.gpkg;preencher;preencher;preencher;preencher;preencher;preencher;preencher;1;sim;sim/nao;preencher;preencher;preencher;09_gis/03_camadas_validadas;preencher
EOF

          cat > "$BASE/drive_map_replicacao_gis.csv" <<'EOF'
arquivo;pasta_drive
GeoPackage bruto original;09_gis/01_insumos_brutos
GeoPackage isolado validado;09_gis/03_camadas_validadas
GeoPackage com tabela relacional;09_gis/03_camadas_validadas
Projeto QGIS QGZ;09_gis/02_qgis_projetos
Prints de validação visual;09_gis/04_outputs/rodada_municipio_validacao_visual
Logs;09_gis/05_logs
ZIP de artefato GitHub;07_versoes_congeladas
EOF

          cat > data/processed/gis/gis_replication_package_registry_4_22_e.csv <<'EOF'
rodada;pacote;arquivos_operacionais;checklist_itens;modelo_manifesto;mapa_drive;trava
4.22-E;replicacao_gis_novos_municipios;5;10;sim;sim;nao_processa_geometria_nao_calcula_area_densidade_buffer_centroide_score_final
EOF

          cat > data/processed/gis/gis_replication_package_status_4_22_e.csv <<'EOF'
rodada;status;erros_estruturais;lacunas_registradas;proxima_rodada;proxima_rodada_descricao
4.22-E;sucesso;0;2;4.22-F;aplicacao do pacote GIS a segundo municipio ou fechamento do modulo GIS Manaus
EOF

          cat > data/processed/gis/gis_replication_package_gaps_4_22_e.csv <<'EOF'
gap_id;tipo;criticidade;descricao;acao_recomendada;bloqueia_score_final
GAP_422E_SEM_PROCESSAMENTO_GEOMETRICO;metodologico;controlada;Pacote operacional não processa geometria real;Executar validação geométrica e join visual no QGIS para cada novo município;sim
GAP_422E_DRIVE_NAO_VERIFICADO;arquivamento;baixa;Workflow não acessa o Google Drive;Confirmar arquivamento visualmente pelo operador;nao
EOF

          cat > data/evidence/evidence_gis_replication_package_4_22_e.csv <<'EOF'
id_evidencia;tipo_evidencia;descricao;status;limitacao
EVD_GIS_REPLICATION_PACKAGE_4_22_E;pacote_operacional;Pacote para replicação controlada do fluxo GIS em novos municípios;gerado;Não processa geometria e não verifica Drive
EOF

          cat > outputs/reports/RELATORIO_GIS_REPLICACAO_4_22_E.md <<'EOF'
# Rodada 4.22-E — pacote operacional GIS para replicação em novos municípios

## Resultado

Pacote operacional gerado para replicar o fluxo GIS validado em Manaus.

## Arquivos principais

- GUIA_CURTO_REPLICACAO_GIS_NOVO_MUNICIPIO.md
- GUIA_TECNICO_QGIS_REPLICACAO_MUNICIPIO.md
- checklist_replicacao_gis_novo_municipio.csv
- gis_novo_municipio_manifest_template.csv
- drive_map_replicacao_gis.csv

## Travas

- Não processa geometria.
- Não altera GeoPackage.
- Não calcula área.
- Não calcula densidade.
- Não calcula centroide.
- Não calcula buffer.
- Não libera score AIMM final.

## Próximo uso

A equipe deve usar este pacote antes de iniciar novo município no QGIS.
EOF

          cat > outputs/logs/teste_gis_replicacao_4_22_e.txt <<'EOF'
TESTE GIS_REPLICATION_PACKAGE_4_22_E — Fito+ Amazônia
======================================================================================
Pacote operacional GIS gerado: sim
Itens de checklist: 10
Modelo de manifesto: sim
Mapa de Drive: sim
Lacunas registradas: 2
Erros estruturais: 0

Resultado: SUCESSO.
Pacote operacional GIS para replicação em novos municípios foi gerado.

Trava: não processa geometria, não calcula área, densidade, centroide, buffer nem score AIMM final.
EOF

          test -s "$BASE/GUIA_CURTO_REPLICACAO_GIS_NOVO_MUNICIPIO.md"
          test -s "$BASE/GUIA_TECNICO_QGIS_REPLICACAO_MUNICIPIO.md"
          test -s "$BASE/checklist_replicacao_gis_novo_municipio.csv"
          test -s "$BASE/gis_novo_municipio_manifest_template.csv"
          test -s "$BASE/drive_map_replicacao_gis.csv"
          test -s data/processed/gis/gis_replication_package_registry_4_22_e.csv
          test -s data/processed/gis/gis_replication_package_status_4_22_e.csv
          test -s data/processed/gis/gis_replication_package_gaps_4_22_e.csv
          test -s data/evidence/evidence_gis_replication_package_4_22_e.csv
          test -s outputs/reports/RELATORIO_GIS_REPLICACAO_4_22_E.md
          test -s outputs/logs/teste_gis_replicacao_4_22_e.txt

          cat outputs/logs/teste_gis_replicacao_4_22_e.txt

      - name: Publicar artefatos da Rodada 4.22-E
        uses: actions/upload-artifact@v4
        with:
          name: rodada-4-22-e-gis-replication-package-fito-amazonia
          if-no-files-found: error
          path: |
            outputs/gis/rodada_4_22_E_pacote_replicacao/GUIA_CURTO_REPLICACAO_GIS_NOVO_MUNICIPIO.md
            outputs/gis/rodada_4_22_E_pacote_replicacao/GUIA_TECNICO_QGIS_REPLICACAO_MUNICIPIO.md
            outputs/gis/rodada_4_22_E_pacote_replicacao/checklist_replicacao_gis_novo_municipio.csv
            outputs/gis/rodada_4_22_E_pacote_replicacao/gis_novo_municipio_manifest_template.csv
            outputs/gis/rodada_4_22_E_pacote_replicacao/drive_map_replicacao_gis.csv
            data/processed/gis/gis_replication_package_registry_4_22_e.csv
            data/processed/gis/gis_replication_package_status_4_22_e.csv
            data/processed/gis/gis_replication_package_gaps_4_22_e.csv
            data/evidence/evidence_gis_replication_package_4_22_e.csv
            outputs/reports/RELATORIO_GIS_REPLICACAO_4_22_E.md
            outputs/logs/teste_gis_replicacao_4_22_e.txt
