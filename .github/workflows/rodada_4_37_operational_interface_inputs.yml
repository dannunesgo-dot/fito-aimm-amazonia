name: rodada-4-37-operational-interface-inputs

"on":
  workflow_dispatch:
    inputs:
      case_id:
        description: "ID do caso/projeto"
        required: true
        default: "IFC_MANAUS_001"
        type: string
      codigo_ibge:
        description: "Código IBGE do município"
        required: true
        default: "1302603"
        type: string
      municipio:
        description: "Município"
        required: true
        default: "Manaus"
        type: string
      uf:
        description: "UF"
        required: true
        default: "AM"
        type: string
      area_km2:
        description: "Área do município em km²"
        required: true
        default: "11401.092"
        type: string
      drive_input_folder:
        description: "Link ou ID da pasta Drive com documentos de entrada"
        required: true
        type: string
      drive_output_folder:
        description: "Link ou ID da pasta Drive para salvar relatórios. Opcional; vazio usa pasta teste."
        required: false
        type: string
      objetivo_projeto:
        description: "Objetivo do projeto"
        required: true
        default: "Avaliar projeto com abordagem AIMM/IFC usando documentos, GIS e evidências."
        type: string
      tipo_projeto:
        description: "Tipo de projeto"
        required: true
        default: "ifc_project"
        type: choice
        options:
          - ifc_project
          - cadeia_valor
          - farmacia_viva
          - bioeconomia
          - outro
      nivel_relatorio:
        description: "Nível do relatório"
        required: true
        default: "tecnico_profissional"
        type: choice
        options:
          - executivo
          - tecnico_profissional
          - completo
      usar_gis:
        description: "Usar GIS na análise?"
        required: true
        default: true
        type: boolean
      extrair_documentos:
        description: "Extrair texto de documentos?"
        required: true
        default: true
        type: boolean
      observacao:
        description: "Observações adicionais"
        required: false
        default: "Considerar dimensões AIMM, riscos, evidências, GIS, IFC e lacunas documentais."
        type: string

permissions:
  contents: read

jobs:
  operational-interface-inputs:
    name: operational-interface-inputs
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
      GOOGLE_DRIVE_TEST_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_TEST_FOLDER_ID }}
      GOOGLE_DRIVE_ROOT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}

      AIMM_CASE_ID: ${{ inputs.case_id }}
      AIMM_CODIGO_IBGE: ${{ inputs.codigo_ibge }}
      AIMM_MUNICIPIO: ${{ inputs.municipio }}
      AIMM_UF: ${{ inputs.uf }}
      AIMM_AREA_KM2: ${{ inputs.area_km2 }}
      AIMM_DRIVE_INPUT_FOLDER: ${{ inputs.drive_input_folder }}
      AIMM_DRIVE_OUTPUT_FOLDER: ${{ inputs.drive_output_folder }}
      AIMM_OBJETIVO_PROJETO: ${{ inputs.objetivo_projeto }}
      AIMM_TIPO_PROJETO: ${{ inputs.tipo_projeto }}
      AIMM_NIVEL_RELATORIO: ${{ inputs.nivel_relatorio }}
      AIMM_USAR_GIS: ${{ inputs.usar_gis }}
      AIMM_EXTRAIR_DOCUMENTOS: ${{ inputs.extrair_documentos }}
      AIMM_OBSERVACAO: ${{ inputs.observacao }}

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-api-python-client google-auth google-auth-oauthlib pypdf python-docx

      - name: Executar interface operacional AIMM 4.37
        shell: bash
        run: python scripts/rodada_4_37_operational_interface_inputs.py

      - name: Publicar artefatos da Rodada 4.37
        uses: actions/upload-artifact@v4
        with:
          name: rodada-4-37-operational-interface-inputs-fito-amazonia
          if-no-files-found: error
          path: |
            outputs/aimm/rodada_4_37_operational_interface
            outputs/reports/RELATORIO_TECNICO_PROFISSIONAL_AIMM_4_37.md
            outputs/reports/RELATORIO_EXECUTIVO_IFC_AIMM_4_37.md
            data/processed/aimm/aimm_operational_interface_registry_4_37.csv
            data/evidence/evidence_aimm_operational_interface_4_37.csv
            outputs/logs/teste_aimm_interface_operacional_4_37.txt
