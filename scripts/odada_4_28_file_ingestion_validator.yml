name: rodada-4-28-file-ingestion-validator

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  file-ingestion-validator:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Executar módulo de ingestão AIMM 4.28
        shell: bash
        run: python scripts/rodada_4_28_file_ingestion_validator.py

      - name: Publicar artefatos da Rodada 4.28
        uses: actions/upload-artifact@v4
        with:
          name: rodada-4-28-file-ingestion-validator-fito-amazonia
          if-no-files-found: error
          path: |
            outputs/aimm/rodada_4_28_ingestao_arquivos
            data/processed/aimm/aimm_file_ingestion_registry_4_28.csv
            data/processed/aimm/aimm_file_ingestion_status_4_28.csv
            data/evidence/evidence_aimm_file_ingestion_4_28.csv
            outputs/reports/RELATORIO_INGESTAO_ARQUIVOS_AIMM_4_28.md
            outputs/logs/teste_aimm_ingestao_arquivos_4_28.txt
